name: Continuous Deployment

on:
  push:
    branches: [ master ]
    tags: ['*']
  pull_request:
  workflow_dispatch:

jobs:
  lint-python:
    name: Lint Python code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.11

      - id: install
        name: Install Python dependencies
        run: uv sync

      - id: lint
        name: Lint
        run: uv run pre-commit run --all-files

  test-docs:
    name: Test Sphinx build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.9

      - name: Install requirements
        run: uv sync --group docs

      - id: build
        name: Build documentation
        run: cd docs && uv run --group docs sphinx-build -b html -d _build/doctrees . _build/html

      - id: save
        name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ github.run_number }}
          path: ./docs
          if-no-files-found: error

  test-python:
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11"]
    name: Test Python code
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install ${{ matrix.python }}

      - name: Show Python path and version
        run: uv run python --version

      - id: install
        name: Install Python dependencies
        run: uv sync

      - id: run
        name: Run tests
        run: uv run pytest -sv

  test-build:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.10

      - id: install
        name: Install Python dependencies
        run: uv sync --frozen

      - id: build
        name: Build release
        run: make build-release
        env:
          # Use the tag name for tagged releases; fall back to 0.0.0 for PRs/branches
          # (github.ref_name is e.g. "240/merge" for PRs, which is not a valid version)
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0' }}

      - id: check
        name: Check release
        run: make check-release

      - id: save
        name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-release-${{ github.run_number }}
          path: ./dist
          if-no-files-found: error

  tag-release:
    name: Tagged PyPI release
    runs-on: ubuntu-latest
    needs: [test-build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - id: fetch
        name: Fetch artifact
        uses: actions/download-artifact@v4
        with:
          name: test-release-${{ github.run_number }}
          path: ./dist

      - id: publish
        name: Publish release
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
          verify_metadata: false
